<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Bind Manager Demo</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #0d0d1a;
        color: #c8c8e0;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 14px;
        min-height: 100vh;
        overflow: hidden;
      }

      #game-canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(ellipse at 50% 40%, #0f2a4a 0%, #050510 70%);
      }

      #game-canvas::after {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(80, 120, 255, 0.07) 1px, transparent 1px),
          linear-gradient(90deg, rgba(80, 120, 255, 0.07) 1px, transparent 1px);
        background-size: 60px 60px;
      }

      #log {
        position: fixed;
        top: 14px;
        left: 14px;
        z-index: 100;
        background: rgba(0, 0, 0, 0.65);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 10px 14px;
        min-width: 300px;
        width: min(44vw, 560px);
        max-height: 50vh;
        overflow-y: auto;
        backdrop-filter: blur(8px);
      }

      #log-title {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #5c7cfa;
        margin-bottom: 6px;
      }

      #controls {
        position: fixed;
        top: 96px;
        right: 14px;
        z-index: 100;
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: flex-end;
      }

      .github-corner {
        position: fixed;
        top: 0;
        right: 0;
        z-index: 140;
      }

      .hud-btn {
        background: rgba(92, 124, 250, 0.2);
        border: 1px solid rgba(92, 124, 250, 0.5);
        border-radius: 7px;
        color: #c0ccff;
        font-size: 13px;
        font-family: inherit;
        cursor: pointer;
        padding: 7px 16px;
        transition: background 0.15s, border-color 0.15s;
      }

      .hud-btn:hover {
        background: rgba(92, 124, 250, 0.4);
        border-color: #5c7cfa;
      }

      #toggle-hints {
        background: rgba(40, 140, 80, 0.2);
        border-color: rgba(40, 200, 100, 0.4);
        color: #80dca0;
      }

      #toggle-hints:hover {
        background: rgba(40, 140, 80, 0.4);
        border-color: rgba(40, 200, 100, 0.8);
      }

      .hud-label {
        position: fixed;
        left: 14px;
        bottom: 14px;
        z-index: 100;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #8ea3f0;
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 7px;
        padding: 6px 10px;
      }

      .log-entry {
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        padding: 4px 0;
      }

      .log-entry:last-child {
        border-bottom: 0;
      }

      .log-entry.pressed {
        color: #7de3a8;
      }

      .log-entry.released {
        color: #ff9f9f;
      }

      .log-entry.held {
        color: #d9b6ff;
      }

      .log-entry.changed {
        color: #ffd18a;
      }

      .log-entry.info {
        color: #9fb7f2;
      }

    </style>
  </head>
  <body>
    <a href="https://github.com/materia79/bind-manager" target="_blank" class="github-corner" aria-label="View source on GitHub"><svg width="80" height="80" viewBox="0 0 250 250" style="fill:#151513; color:#fff; position: absolute; top: 0; border: 0; right: 0;" aria-hidden="true"><path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"/><path d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2" fill="currentColor" style="transform-origin: 130px 106px;" class="octo-arm"/><path d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.4 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.9,65.4 C194.5,69.0 197.7,73.2 200.1,77.6 C213.8,80.2 216.3,84.9 216.3,84.9 C212.7,93.1 206.9,96.0 205.4,96.6 C205.1,102.4 203.0,107.8 198.3,112.5 C181.9,128.9 168.3,122.5 157.7,114.1 C157.9,116.9 156.7,120.9 152.7,124.9 L141.0,136.5 C139.8,137.7 141.6,141.9 141.8,141.8 Z" fill="currentColor" class="octo-body"/></svg></a><style>.github-corner:hover .octo-arm{animation:octocat-wave 560ms ease-in-out}@keyframes octocat-wave{0%,100%{transform:rotate(0)}20%,60%{transform:rotate(-25deg)}40%,80%{transform:rotate(10deg)}}@media (max-width:500px){.github-corner:hover .octo-arm{animation:none}.github-corner .octo-arm{animation:octocat-wave 560ms ease-in-out}}</style>

    <div id="game-canvas" aria-hidden="true"></div>

    <div id="log" aria-live="polite">
      <div id="log-title">Event Log</div>
      <div id="log-entries"></div>
    </div>

    <div id="controls">
      <button id="open-binds" class="hud-btn" type="button">Open Key Bindings</button>
      <button id="open-remap" class="hud-btn" type="button">Input Remap</button>
      <button id="open-tester" class="hud-btn" type="button">Controller Test</button>
      <button id="toggle-hints" class="hud-btn" type="button">Hide Hints</button>
      <button id="reset-all" class="hud-btn" type="button">Reset All Bindings</button>
      <button id="clear-log" class="hud-btn" type="button">Clear Log</button>
    </div>

    <div class="hud-label">Bind Manager Demo</div>

    <script src="../../dist/bind-manager.min.js"></script>
    <script>
      (function () {
        const logPanelEl = document.getElementById('log');
        const logEl = document.getElementById('log-entries');
        const MAX_LOG_LINES = 80;

        const appendLog = (text, type) => {
          const stamp = new Date().toLocaleTimeString();
          const line = document.createElement('div');
          line.className = `log-entry ${type || 'info'}`;
          line.textContent = `[${stamp}] ${text}`;
          logEl.appendChild(line);

          while (logEl.childElementCount > MAX_LOG_LINES) {
            logEl.removeChild(logEl.firstElementChild);
          }

          logPanelEl.scrollTop = logPanelEl.scrollHeight;
        };

        if (!window.BindManager || !window.BindManager.createBindManager) {
          appendLog('ERROR: bind-manager.min.js is missing or invalid.', 'released');
          return;
        }

        const binds = window.BindManager.createBindManager({
          namespace: 'standalone-demo',
          debug: true,
          debugKey: 'F5',
          builtInTools: {
            inputRemap: true,
            controllerTest: true,
          },
        });

        const moveForward = binds.registerAction({
          id: 'move-forward',
          label: 'Move Forward',
          description: 'Move character forward',
          group: 'Movement',
          slots: 2,
          defaultBindings: ['KeyW', 'ArrowUp'],
          gamepadSlots: 1,
          defaultGamepadBindings: ['GP_A1N'],
        });

        const moveBackward = binds.registerAction({
          id: 'move-backward',
          label: 'Move Backward',
          description: 'Move character backward',
          group: 'Movement',
          slots: 2,
          defaultBindings: ['KeyS', 'ArrowDown'],
          gamepadSlots: 1,
          defaultGamepadBindings: ['GP_A1P'],
        });

        const jump = binds.registerAction({
          id: 'jump',
          label: 'Jump',
          description: 'Jump action',
          group: 'Movement',
          slots: 1,
          defaultBindings: ['Space'],
          gamepadSlots: 1,
          defaultGamepadBindings: ['GP_B0'],
        });

        const attack = binds.registerAction({
          id: 'attack',
          label: 'Attack',
          description: 'Primary attack',
          group: 'Combat',
          slots: 1,
          defaultBindings: ['KeyF'],
          gamepadSlots: 1,
          defaultGamepadBindings: ['GP_B2'],
        });

        const block = binds.registerAction({
          id: 'block',
          label: 'Block',
          description: 'Hold to block',
          group: 'Combat',
          slots: 1,
          defaultBindings: ['KeyG'],
          gamepadSlots: 1,
          defaultGamepadBindings: ['GP_B1'],
        });

        const interact = binds.registerAction({
          id: 'interact',
          label: 'Interact',
          description: 'Interact with world objects',
          group: 'Interface',
          slots: 1,
          defaultBindings: ['KeyE'],
          gamepadSlots: 1,
          defaultGamepadBindings: ['GP_B3'],
        });

        const openMap = binds.registerAction({
          id: 'open-map',
          label: 'Open Map',
          description: 'Toggle world map',
          group: 'Interface',
          slots: 1,
          defaultBindings: ['KeyM'],
          gamepadSlots: 1,
          defaultGamepadBindings: ['GP_B9'],
        });

        const sprint = binds.registerAction({
          id: 'sprint',
          label: 'Sprint',
          description: 'Hold to sprint',
          group: 'Movement',
          slots: 1,
          defaultBindings: ['ShiftLeft'],
          gamepadSlots: 1,
          defaultGamepadBindings: ['GP_B5'],
        });

        moveForward.showHint();
        moveBackward.showHint();
        jump.showHint();
        attack.showHint();
        interact.showHint();

        moveForward.onPressed(() => appendLog('[action] move-forward pressed', 'pressed'));
        moveForward.onReleased(() => appendLog('[action] move-forward released', 'released'));
        moveForward.onHeld(() => appendLog('[action] move-forward held', 'held'));
        moveBackward.onPressed(() => appendLog('[action] move-backward pressed', 'pressed'));
        jump.onPressed(() => appendLog('[action] jump pressed', 'pressed'));
        attack.onPressed(() => appendLog('[action] attack pressed', 'pressed'));
        block.onPressed(() => appendLog('[action] block start', 'pressed'));
        block.onReleased(() => appendLog('[action] block stop', 'released'));
        interact.onPressed(() => appendLog('[action] interact pressed', 'pressed'));
        openMap.onPressed(() => appendLog('[action] open-map toggled', 'pressed'));
        sprint.onPressed(() => appendLog('[action] sprint start', 'pressed'));
        sprint.onReleased(() => appendLog('[action] sprint stop', 'released'));

        binds.subscribe((event) => {
          if (event.type === 'binding-changed') {
            const value = event.newCode == null ? 'unbound' : String(event.newCode);
            appendLog(`[bind] ${event.actionId} slot ${event.slot} => ${value}`, 'changed');
          } else if (event.type === 'reset') {
            appendLog(`[info] ${event.actionId} reset to defaults`, 'info');
          }
        });

        document.getElementById('open-binds').addEventListener('click', () => binds.open());
        document.getElementById('open-remap').addEventListener('click', () => binds.openInputRemap());
        document.getElementById('open-tester').addEventListener('click', () => binds.openControllerTest());

        let hintsVisible = true;
        const hintsButton = document.getElementById('toggle-hints');
        hintsButton.addEventListener('click', () => {
          hintsVisible = !hintsVisible;
          if (hintsVisible) {
            binds.showAllHints();
            hintsButton.textContent = 'Hide Hints';
          } else {
            binds.hideAllHints();
            hintsButton.textContent = 'Show Hints';
          }
          appendLog(`[info] hints ${hintsVisible ? 'shown' : 'hidden'}`, 'info');
        });

        document.getElementById('reset-all').addEventListener('click', () => {
          binds.resetAll();
          appendLog('[info] reset all bindings', 'info');
        });

        document.getElementById('clear-log').addEventListener('click', () => {
          logEl.textContent = '';
          appendLog('[info] log cleared', 'info');
        });

        appendLog('Demo ready. Press F5 to toggle Bind Manager UI.', 'info');
        appendLog('Try W/ArrowUp, Space, F, G, E, M, ShiftLeft, or connected gamepad defaults.', 'info');
      })();
    </script>
  </body>
</html>
