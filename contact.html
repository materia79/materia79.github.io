    .pm-status {

    .pm-status.error {
      color: var(--pm-error);
    }

    .pm-status.ok {

    .pm-footer {
      margin-top: 0.8rem;
      font-size: 0.84rem;

    .pm-chip {

      border-radius: 0.25rem;

    .nav-menu a:hover,
    .nav-menu a.active {

    }

    .hamburger {
      display: none;
      background: none;
      border: none;
      color: #f3f6f8;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.5rem;

    @media (max-width: 768px) {
      .site-header-contact {
        flex-wrap: wrap;

      .site-header-contact h1 {
        font-size: 1.55rem;
        flex-basis: 100%;

      .hamburger {
        display: inline-block;

        padding: 0.5rem 0 0 0;
      }

      .nav-menu.hidden {
        display: none;
      }

      .nav-menu:not(.hidden) {
        display: flex;
      }
    }

<body>
  <header class="site-header-contact">

  <script id="__pm_config__"
    type="application/json">{"schemaVersion":1,"username":"Simon","backendBaseUrl":"https://push.port0.org","publicKey":"BLkCQV5b2yl3j7EbflLG8bFnAAMcX4jnkiifEBQw1Cy9hHkm4fKYMiBolf4ASXte1r7I8OH_QJzytpXQkB44T-A","generatedAt":"2026-04-03T13:18:37.799Z","features":{"websocket":true,"captcha":false}}</script>
  <script>
    /* pm-runtime v1.0.0 */
    (function () {
      const EXPECTED_SCHEMA_VERSION = 1;
      const cfgText = document.getElementById("__pm_config__")?.textContent || "{}";
      let config = {};
      try {
        config = JSON.parse(cfgText);
      } catch (_err) {
        setStatus("Failed to load embedded config.", true);
        return;
      }

      const state = {
        socketFailures: 0,
        pollTimer: null,
        socket: null,
        captchaConfigKey: "",
      };

      const el = {
        title: document.getElementById("pm-title"),
        bio: document.getElementById("pm-bio"),
        banner: document.getElementById("pm-banner"),
        form: document.getElementById("pm-form"),
        senderName: document.getElementById("pm-sender-name"),
        reason: document.getElementById("pm-reason"),
        content: document.getElementById("pm-content"),
        captchaSlot: document.getElementById("pm-captcha-slot"),
        captchaToken: document.getElementById("pm-captcha-token"),
        status: document.getElementById("pm-status"),
        generated: document.getElementById("pm-generated"),
        live: document.getElementById("pm-live"),
      };

      const safeBackend = String(config.backendBaseUrl || "").replace(/\/$/, "");
      if (!safeBackend) {
        setStatus("Missing backend URL in config.", true);
        return;
      }

      if (Number(config.schemaVersion) !== Number(EXPECTED_SCHEMA_VERSION)) {
        showBanner("A newer userpage format is available. Re-download from your inbox.");
      }

      if (config.generatedAt) {
        el.generated.textContent = "Generated: " + new Date(config.generatedAt).toLocaleString();
      }

      fetchProfile(true);
      wireForm();
      if (config.features && config.features.websocket) {
        connectSocket();
      } else {
        startPolling();
      }

      function showBanner(message) {
        el.banner.textContent = message;
        el.banner.style.display = "block";
      }

      function setStatus(message, isError, isSuccess) {
        el.status.textContent = message || "";
        el.status.className = "pm-status";
        if (isError) el.status.classList.add("error");
        if (isSuccess) el.status.classList.add("ok");
      }

      function setLiveStatus(message) {
        el.live.textContent = "Live: " + message;
      }

      async function fetchProfile(firstLoad) {
        const endpoint = safeBackend + "/api/public/userpage/" + encodeURIComponent(config.username || "");
        try {
          const response = await fetch(endpoint, {
            method: "GET",
            headers: {
              "X-PM-Schema-Version": String(config.schemaVersion || EXPECTED_SCHEMA_VERSION),
            },
          });
          const payload = await response.json().catch(function () { return {}; });
          if (!response.ok) {
            if (firstLoad) {
              setStatus(payload.error || "Profile unavailable.", true);
            }
            return;
          }

          const displayName = payload.displayName || ("@" + payload.username);
          el.title.textContent = displayName;
          el.bio.textContent = payload.bio || "Send a private message. Only the owner can read full content.";
          setupCaptcha(payload.captcha || { enabled: false, provider: "none", siteKey: "" });

          const headerVersion = Number(response.headers.get("X-PM-Schema-Version") || EXPECTED_SCHEMA_VERSION);
          if (headerVersion > Number(config.schemaVersion || 0)) {
            showBanner("A newer userpage version is available. Re-download to update.");
          }
        } catch (_err) {
          if (firstLoad) {
            setStatus("Could not reach backend server.", true);
          }
        }
      }

      function wireForm() {
        el.form.addEventListener("submit", async function (event) {
          event.preventDefault();
          setStatus("");

          const body = {
            senderName: String(el.senderName.value || "").trim(),
            reason: String(el.reason.value || "").trim(),
            content: String(el.content.value || "").trim(),
            captchaToken: String(el.captchaToken.value || ""),
          };

          const endpoint = safeBackend + "/api/public/userpage/" + encodeURIComponent(config.username || "") + "/contact";
          try {
            const response = await fetch(endpoint, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "X-PM-Schema-Version": String(config.schemaVersion || EXPECTED_SCHEMA_VERSION),
              },
              body: JSON.stringify(body),
            });

            const payload = await response.json().catch(function () { return {}; });
            if (!response.ok) {
              setStatus(payload.error || "Message failed.", true);
              return;
            }

            setStatus("Message sent successfully.", false, true);
            el.form.reset();

            if (payload.guestToken && payload.conversationId) {
              const target = safeBackend + "/m/" + encodeURIComponent(payload.conversationId) + "?guestToken=" + encodeURIComponent(payload.guestToken);
              window.location.href = target;
            }

            el.captchaToken.value = "";
          } catch (_err) {
            setStatus("Network error while sending message.", true);
          }
        });
      }

      function ensureScript(src) {
        return new Promise(function (resolve, reject) {
          const existing = document.querySelector("script[src='" + src + "']");
          if (existing) {
            resolve();
            return;
          }
          const script = document.createElement("script");
          script.src = src;
          script.async = true;
          script.defer = true;
          script.onload = function () { resolve(); };
          script.onerror = function () { reject(new Error("script-load-failed")); };
          document.head.appendChild(script);
        });
      }

      function setupCaptcha(captcha) {
        const key = JSON.stringify(captcha || {});
        if (state.captchaConfigKey === key) {
          return;
        }
        state.captchaConfigKey = key;
        el.captchaSlot.innerHTML = "";

        if (!captcha.enabled || captcha.provider === "none") {
          return;
        }
        if (!captcha.siteKey) {
          el.captchaSlot.innerHTML = "<p class='pm-status error'>Captcha site key is missing.</p>";
          return;
        }

        if (captcha.provider === "turnstile") {
          ensureScript("https://challenges.cloudflare.com/turnstile/v0/api.js").then(function () {
            window.onPmTurnstileDone = function (token) {
              el.captchaToken.value = token;
            };
            el.captchaSlot.innerHTML = "<div class='cf-turnstile' data-sitekey='" + captcha.siteKey + "' data-callback='onPmTurnstileDone'></div>";
          }).catch(function () {
            el.captchaSlot.innerHTML = "<p class='pm-status error'>Could not load captcha.</p>";
          });
          return;
        }

        if (captcha.provider === "hcaptcha") {
          ensureScript("https://js.hcaptcha.com/1/api.js").then(function () {
            window.onPmHcaptchaDone = function (token) {
              el.captchaToken.value = token;
            };
            el.captchaSlot.innerHTML = "<div class='h-captcha' data-sitekey='" + captcha.siteKey + "' data-callback='onPmHcaptchaDone'></div>";
          }).catch(function () {
            el.captchaSlot.innerHTML = "<p class='pm-status error'>Could not load captcha.</p>";
          });
        }
      }

      function connectSocket() {
        if (!window.io) {
          injectSocketIoScript();
          return;
        }
        attachSocket();
      }

      function injectSocketIoScript() {
        const script = document.createElement("script");
        script.src = safeBackend + "/socket.io/socket.io.js";
        script.async = true;
        script.onload = function () {
          attachSocket();
        };
        script.onerror = function () {
          state.socketFailures += 1;
          if (state.socketFailures >= 3) {
            startPolling();
          }
        };
        document.head.appendChild(script);
      }

      function attachSocket() {
        if (!window.io) {
          startPolling();
          return;
        }

        const wsBase = safeBackend.replace(/^http:/, "ws:").replace(/^https:/, "wss:");
        state.socket = window.io(wsBase + "/embed", {
          transports: ["websocket", "polling"],
          query: {
            embedUser: config.username || "",
          },
          reconnectionAttempts: 3,
        });

        state.socket.on("connect", function () {
          setLiveStatus("connected");
          stopPolling();
        });

        state.socket.on("disconnect", function () {
          state.socketFailures += 1;
          setLiveStatus("disconnected");
          if (state.socketFailures >= 3) {
            startPolling();
          }
        });

        state.socket.on("embed:idle", function () {
          setLiveStatus("idle");
          startPolling();
        });

        state.socket.on("embed:contact", function () {
          fetchProfile(false);
        });

        state.socket.on("connect_error", function () {
          state.socketFailures += 1;
          if (state.socketFailures >= 3) {
            setLiveStatus("polling");
            startPolling();
          }
        });
      }

      function startPolling() {
        if (state.pollTimer) return;
        setLiveStatus("polling");
        state.pollTimer = setInterval(function () {
          fetchProfile(false);
        }, 30000);
      }

      function stopPolling() {
        if (!state.pollTimer) return;
        clearInterval(state.pollTimer);
        state.pollTimer = null;
      }
    })();
  </script>

  <script>
    const hamburger = document.getElementById('menu-toggle');
    const navMenu = document.getElementById('nav-menu');

    hamburger.addEventListener('click', () => {
      navMenu.classList.toggle('hidden');
    });

    // Update active link based on current page
    const currentPage = window.location.pathname.split('/').pop() || 'contact.html';
    document.querySelectorAll('.nav-menu a').forEach(link => {
      const href = link.getAttribute('href').split('/').pop() || 'contact.html';
      if (href === currentPage) {
        link.classList.add('active');
      } else {
        link.classList.remove('active');
      }
    });
  </script>
